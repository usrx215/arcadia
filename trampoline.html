<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trampoline</title>
  <link rel="icon" type="image/x-icon" href="https://usrx215.github.io/scgames/trampoline.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #game {
      position: relative;
      width: 600px;
      height: 400px;
      background: #222;
      border: 2px solid white;
      margin-top: 20px;
      overflow: hidden;
    }
    .player {
      width: 30px;
      height: 30px;
      background: yellow;
      position: absolute;
      bottom: 0;
      left: 285px;
    }
    .enemy {
      position: absolute;
    }
    .spike-left {
      width: 0;
      height: 0;
      border-top: 20px solid transparent;
      border-bottom: 20px solid transparent;
      border-left: 20px solid red;
    }
    .spike-right {
      width: 0;
      height: 0;
      border-top: 20px solid transparent;
      border-bottom: 20px solid transparent;
      border-right: 20px solid red;
    }
    .spike-green-left {
      width: 0;
      height: 0;
      border-top: 20px solid transparent;
      border-bottom: 20px solid transparent;
      border-left: 20px solid green;
    }
    .spike-green-right {
      width: 0;
      height: 0;
      border-top: 20px solid transparent;
      border-bottom: 20px solid transparent;
      border-right: 20px solid green;
    }

    .spike-left,
    .spike-right,
    .spike-green-left,
    .spike-green-right {
      position: absolute;
    }
    
    .bullet {
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
    }
    .bullet-green {
      background-color: green;
    }
    .frog {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background-color: orange;
      transition: background-color 0.1s ease;
    }
    #info {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>Trampoline</h1>
  <div id="info">Hits left: <span id="hits">3</span></div>
  <div id="game">
    <div class="player" id="player"></div>
  </div>

  <script>
    const game = document.getElementById('game');
    const player = document.getElementById('player');
    const hitsDisplay = document.getElementById('hits');
    let hits = 3;
    let gameOver = false;

    let playerX = 285;
    let playerY = 0;
    let vy = 0;
    let grounded = true;
    let dashCooldown = false;
    let keys = {};

    document.addEventListener('keydown', (e) => keys[e.key] = true);
    document.addEventListener('keyup', (e) => keys[e.key] = false);

    function updatePlayer() {
      if (gameOver) return;

      if (keys['a'] || keys['A']) playerX = Math.max(0, playerX - 3);
      if (keys['d'] || keys['D']) playerX = Math.min(570, playerX + 3);

      if ((keys['ArrowLeft'] || keys['ArrowRight']) && !dashCooldown) {
        if (keys['ArrowLeft']) playerX = Math.max(0, playerX - 50);
        if (keys['ArrowRight']) playerX = Math.min(570, playerX + 50);
        dashCooldown = true;
        setTimeout(() => dashCooldown = false, 1000);
      }

      if ((keys['w'] || keys[' ']) && !keys['usedJump']) {
        if (grounded) {
          vy = keys['s'] || keys['S'] || keys['Shift'] ? 8 : 15;
        } else {
          vy += keys['s'] || keys['S'] || keys['Shift'] ? 1 : 3;
        }
        keys['usedJump'] = true;
      }
      if (!keys['w'] && !keys[' ']) {
        keys['usedJump'] = false;
      }

      if (keys['ArrowDown']) vy -= 2;

      vy -= 0.5;
      playerY += vy;

      if (playerY <= 0) {
        playerY = 0;
        grounded = true;
        vy = 10;
      } else {
        grounded = false;
      }

      player.style.bottom = playerY + 'px';
      player.style.left = playerX + 'px';

      requestAnimationFrame(updatePlayer);
    }

    function spawnFrog() {
      if (gameOver) return;

      const frog = document.createElement('div');
      frog.classList.add('enemy', 'frog');
      const side = Math.random() < 0.5 ? 'left' : 'right';
      let frogX = side === 'left' ? 0 : 575;
      frog.style.left = frogX + 'px';
      frog.style.bottom = '0px';
      game.appendChild(frog);

      let chargeProgress = 0;
      const chargeInterval = setInterval(() => {
        chargeProgress += 0.05;
        if (chargeProgress >= 1) chargeProgress = 1;
        const r = Math.floor(255 - (chargeProgress * 255));
        const g = Math.floor(chargeProgress * 255);
        frog.style.backgroundColor = `rgb(${r},${g},0)`;
      }, 50);

      const targetX = playerX + 15;

      setTimeout(() => {
        clearInterval(chargeInterval);
        let y = 0;
        let vy = 7;
        let vx = (targetX - frogX) / 30;
        const jump = setInterval(() => {
          if (gameOver) {
            clearInterval(jump);
            frog.remove();
            return;
          }
          y += vy;
          vy -= 0.5;
          frogX += vx;
          frog.style.left = frogX + 'px';
          frog.style.bottom = y + 'px';
          if (y <= 0) {
            clearInterval(jump);
            frog.remove();
          }
          checkCollision(frog, jump);
        }, 30);
      }, 1000);
    }

    function spawnSpike() {
  if (gameOver) return;
  
  const side = Math.random() < 0.5 ? 'left' : 'right';
  const spike = document.createElement('div');
  const isGreen = Math.random() < 0.1;
  
  // Create spike based on its side (left or right)
  if (isGreen) {
    spike.classList.add(side === 'left' ? 'spike-green-left' : 'spike-green-right');
  } else {
    spike.classList.add(side === 'left' ? 'spike-left' : 'spike-right');
  }
  
  spike.style.top = Math.random() * 360 + 'px';

  // Ensure right-side spikes are properly positioned
  if (side === 'left') {
  spike.style.left = '0px';
} else {
  spike.style.left = '580px'; // Properly position spike on the right edge
}


  game.appendChild(spike);

  const duration = (Math.random() * 9 + 1) * 1000;
  setTimeout(() => spike.remove(), duration);
}


    function spawnBullet() {
      if (gameOver) return;
      const bullet = document.createElement('div');
      bullet.classList.add('enemy', 'bullet');
      const isGreen = Math.random() < 0.1;
      bullet.style.top = Math.random() * 390 + 'px';
      bullet.style.left = '-10px';
      if (isGreen) bullet.classList.add('bullet-green');
      game.appendChild(bullet);

      let x = -10;
      const interval = setInterval(() => {
        if (gameOver) {
          clearInterval(interval);
          bullet.remove();
          return;
        }
        x += 5;
        bullet.style.left = x + 'px';
        if (x > 610) {
          clearInterval(interval);
          bullet.remove();
        }
        checkCollision(bullet, interval);
      }, 30);
    }

    function checkCollision(enemy, interval = null) {
      const rect1 = player.getBoundingClientRect();
      const rect2 = enemy.getBoundingClientRect();
      if (
        rect1.left < rect2.right &&
        rect1.right > rect2.left &&
        rect1.top < rect2.bottom &&
        rect1.bottom > rect2.top
      ) {
        if (!enemy.hit) {
          enemy.hit = true;
          if (enemy.classList.contains('frog')) {
            if (enemy.style.backgroundColor === 'rgb(0, 255, 0)') {
              hits++;
              hitsDisplay.textContent = hits;
            } else {
              hits--;
              hitsDisplay.textContent = hits;
            }
          } else if (enemy.classList.contains('bullet')) {
            if (enemy.classList.contains('bullet-green')) {
              hits++;
              hitsDisplay.textContent = hits;
            } else {
              hits--;
              hitsDisplay.textContent = hits;
            }
          } else if (enemy.classList.contains('spike-left') || enemy.classList.contains('spike-right')) {
            if (enemy.classList.contains('spike-green-left') || enemy.classList.contains('spike-green-right')) {
              hits++;
              hitsDisplay.textContent = hits;
            } else {
              hits--;
              hitsDisplay.textContent = hits;
            }
          }
          if (interval) clearInterval(interval);
          enemy.remove();
          if (hits <= 0) {
            gameOver = true;
            alert("Game Over!");
            location.reload();
          }
        }
      }
    }

    function startEnemies() {
      setInterval(spawnSpike, 2000);
      setInterval(spawnBullet, 1500);
      setInterval(spawnFrog, 2500);
    }

    updatePlayer();
    startEnemies();
  </script>
</body>
</html>
