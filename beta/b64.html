<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64 Encoder/Decoder</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: rgba(20, 25, 45, 0.9);
      border-radius: 12px;
      padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #00f5ff, #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 2rem;
      font-weight: 300;
    }

    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 120px;
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-encode {
      background: linear-gradient(135deg, #00f5ff, #00d4ff);
      color: #0a0e27;
    }

    .btn-encode:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 245, 255, 0.3);
    }

    .btn-decode {
      background: linear-gradient(135deg, #ff006e, #d4006e);
      color: #fff;
    }

    .btn-decode:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 0, 110, 0.3);
    }

    .btn-clear {
      background: rgba(255, 255, 255, 0.1);
      color: #e0e0e0;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-clear:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    textarea {
      width: 100%;
      height: 180px;
      padding: 1rem;
      margin-bottom: 1rem;
      background: rgba(10, 14, 39, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      resize: vertical;
      transition: all 0.3s ease;
    }

    textarea:focus {
      outline: none;
      border-color: #00f5ff;
      box-shadow: 0 0 0 2px rgba(0, 245, 255, 0.1);
    }

    textarea::placeholder {
      color: #555;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #00f5ff;
      font-size: 0.85rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .output-wrapper {
      position: relative;
    }

    .copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 0.4rem 0.7rem;
      font-size: 0.7rem;
      border-radius: 4px;
      background: rgba(0, 245, 255, 0.15);
      color: #00f5ff;
      border: 1px solid rgba(0, 245, 255, 0.4);
      cursor: pointer;
    }

    .copy-btn:hover {
      background: rgba(0, 245, 255, 0.25);
    }

    .info {
      margin-top: 1.5rem;
      padding: 1rem;
      background: rgba(0, 245, 255, 0.05);
      border-left: 3px solid #00f5ff;
      border-radius: 4px;
      font-size: 0.8rem;
      color: #aaa;
    }

    .error {
      background: rgba(255, 0, 110, 0.1);
      border-left-color: #ff006e;
      color: #ff6b9d;
      display: none;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Base64 Codec</h1>
    <p class="subtitle">Efficient encoder/decoder for strings of any size</p>

    <div class="controls">
      <button class="btn-encode" onclick="encode()">→ Encode</button>
      <button class="btn-decode" onclick="decode()">← Decode</button>
      <button class="btn-clear" onclick="clearAll()">Clear</button>
    </div>

    <label for="input">Input</label>
    <textarea id="input" placeholder="Enter text to encode or base64 to decode..."></textarea>

    <label for="output">Output</label>
    <div class="output-wrapper">
      <textarea id="output" readonly placeholder="Result will appear here..."></textarea>
      <button class="copy-btn" onclick="copyOutput()">Copy</button>
    </div>

    <div class="info">
      Handles large strings efficiently using chunked processing to minimize memory usage.
    </div>
    <div class="info error" id="error"></div>
  </div>

  <script>
    const inputEl = document.getElementById('input');
    const outputEl = document.getElementById('output');
    const errorEl = document.getElementById('error');

    const CHUNK_SIZE = 65536;

    function showError(message) {
      errorEl.textContent = message;
      errorEl.style.display = 'block';
      setTimeout(() => {
        errorEl.style.display = 'none';
      }, 4000);
    }

    function encode() {
      const input = inputEl.value;
      if (!input) {
        showError('Please enter text to encode');
        return;
      }

      try {
        if (input.length < CHUNK_SIZE) {
          outputEl.value = btoa(unescape(encodeURIComponent(input)));
        } else {
          let result = '';
          for (let i = 0; i < input.length; i += CHUNK_SIZE) {
            const chunk = input.slice(i, i + CHUNK_SIZE);
            result += btoa(unescape(encodeURIComponent(chunk)));
          }
          outputEl.value = result;
        }
      } catch (e) {
        showError('Encoding failed: ' + e.message);
      }
    }

    function decode() {
      const input = inputEl.value.trim();
      if (!input) {
        showError('Please enter base64 to decode');
        return;
      }

      try {
        if (input.length < CHUNK_SIZE) {
          outputEl.value = decodeURIComponent(escape(atob(input)));
        } else {
          let result = '';
          for (let i = 0; i < input.length; i += CHUNK_SIZE) {
            const chunk = input.slice(i, i + CHUNK_SIZE);
            result += decodeURIComponent(escape(atob(chunk)));
          }
          outputEl.value = result;
        }
      } catch (e) {
        showError('Decoding failed: Invalid base64 string');
      }
    }

    function clearAll() {
      inputEl.value = '';
      outputEl.value = '';
    }

    function copyOutput() {
      if (!outputEl.value) return;

      navigator.clipboard.writeText(outputEl.value).then(() => {
        const btn = document.querySelector('.copy-btn');
        const original = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => {
          btn.textContent = original;
        }, 1200);
      });
    }

    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey || e.metaKey) {
        if (e.key === 'e') {
          e.preventDefault();
          encode();
        } else if (e.key === 'd') {
          e.preventDefault();
          decode();
        } else if (e.key === 'k') {
          e.preventDefault();
          clearAll();
        }
      }
    });
  </script>
</body>
</html>
